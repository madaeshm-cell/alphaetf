  document.getElementById('categoryNav').innerHTML = categories.map(cat => `

}

  currentCategory = catId;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderGrid() {
  const cat = categories.find(c => c.id === currentCategory);
