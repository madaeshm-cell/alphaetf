<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ETF Details | Live Chart</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
    color: #f1f5f9;
    font-family: system-ui, -apple-system, sans-serif;
  }
  input[type="range"] { accent-color: #3b82f6; }
  .loader {
    border: 3px solid #1e293b;
    border-top: 3px solid #3b82f6;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .period-btn.active { background: rgba(59,130,246,0.3); border-color: #3b82f6; }
</style>
</head>
<body>
<div class="max-w-7xl mx-auto px-4 py-8">

  <a href="index.html" class="inline-flex items-center gap-2 text-blue-400 hover:text-blue-300 mb-6">
    ← Back to All ETFs
  </a>

  <div id="header" class="bg-gradient-to-br from-slate-800/40 to-slate-900/40 rounded-3xl p-6 border border-slate-700 mb-6">
    <div class="loader"></div>
    <p class="text-center text-slate-400">Loading live data from Yahoo Finance...</p>
  </div>

  <div id="livePrice" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

  <div class="flex flex-wrap gap-2 mb-4">
    <button data-range="1d" data-interval="5m" class="period-btn px-4 py-2 bg-slate-800/60 border border-slate-700 rounded-lg text-sm">1D</button>
    <button data-range="5d" data-interval="15m" class="period-btn px-4 py-2 bg-slate-800/60 border border-slate-700 rounded-lg text-sm">5D</button>
    <button data-range="1mo" data-interval="1d" class="period-btn px-4 py-2 bg-slate-800/60 border border-slate-700 rounded-lg text-sm">1M</button>
    <button data-range="6mo" data-interval="1d" class="period-btn px-4 py-2 bg-slate-800/60 border border-slate-700 rounded-lg text-sm">6M</button>
    <button data-range="1y" data-interval="1d" class="period-btn active px-4 py-2 bg-slate-800/60 border border-slate-700 rounded-lg text-sm">1Y</button>
    <button data-range="5y" data-interval="1wk" class="period-btn px-4 py-2 bg-slate-800/60 border border-slate-700 rounded-lg text-sm">5Y</button>
    <button data-range="max" data-interval="1mo" class="period-btn px-4 py-2 bg-slate-800/60 border border-slate-700 rounded-lg text-sm">MAX</button>
  </div>

  <div class="bg-slate-800/60 rounded-2xl p-6 border border-slate-700 mb-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-bold">📊 Live Price Chart</h3>
      <span id="dataSource" class="text-xs text-slate-500"></span>
    </div>
    <div id="chartLoader" class="loader"></div>
    <canvas id="priceChart" style="max-height:400px;"></canvas>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10">
    <div class="bg-slate-800/60 rounded-2xl p-6 border border-slate-700">
      <h3 class="text-xl font-bold mb-4">🧮 SIP Calculator</h3>
      <div class="space-y-4">
        <div>
          <label class="text-sm text-slate-300 flex justify-between mb-2">
            Monthly Investment <span id="sipAmtLabel" class="text-blue-400 font-bold">₹5,000</span>
          </label>
          <input id="sipAmount" type="range" min="500" max="100000" step="500" value="5000" class="w-full"/>
        </div>
        <div>
          <label class="text-sm text-slate-300 flex justify-between mb-2">
            Period <span id="sipYearsLabel" class="text-blue-400 font-bold">10 years</span>
          </label>
          <input id="sipYears" type="range" min="1" max="30" step="1" value="10" class="w-full"/>
        </div>
        <div class="grid grid-cols-3 gap-3 pt-3">
          <div class="bg-slate-900/60 p-3 rounded-lg text-center">
            <p class="text-xs text-slate-400">Invested</p>
            <p id="sipInvested" class="text-white font-bold">₹0</p>
          </div>
          <div class="bg-slate-900/60 p-3 rounded-lg text-center">
            <p class="text-xs text-slate-400">Gains</p>
            <p id="sipGains" class="text-green-400 font-bold">₹0</p>
          </div>
          <div class="bg-gradient-to-br from-blue-600/30 to-purple-600/30 p-3 rounded-lg text-center">
            <p class="text-xs text-slate-300">Total</p>
            <p id="sipTotal" class="text-white font-bold">₹0</p>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-slate-800/60 rounded-2xl p-6 border border-slate-700">
      <h3 class="text-xl font-bold mb-4">💼 Lump Sum Calculator</h3>
      <div class="space-y-4">
        <div>
          <label class="text-sm text-slate-300 flex justify-between mb-2">
            Amount <span id="lumpAmtLabel" class="text-purple-400 font-bold">₹1,00,000</span>
          </label>
          <input id="lumpAmount" type="range" min="1000" max="1000000" step="1000" value="100000" class="w-full" style="accent-color:#a855f7"/>
        </div>
        <div>
          <label class="text-sm text-slate-300 flex justify-between mb-2">
            Period <span id="lumpYearsLabel" class="text-purple-400 font-bold">5 years</span>
          </label>
          <input id="lumpYears" type="range" min="1" max="30" step="1" value="5" class="w-full" style="accent-color:#a855f7"/>
        </div>
        <div class="grid grid-cols-3 gap-3 pt-3">
          <div class="bg-slate-900/60 p-3 rounded-lg text-center">
            <p class="text-xs text-slate-400">Invested</p>
            <p id="lumpInvested" class="text-white font-bold">₹0</p>
          </div>
          <div class="bg-slate-900/60 p-3 rounded-lg text-center">
            <p class="text-xs text-slate-400">Gains</p>
            <p id="lumpGains" class="text-green-400 font-bold">₹0</p>
          </div>
          <div class="bg-gradient-to-br from-purple-600/30 to-pink-600/30 p-3 rounded-lg text-center">
            <p class="text-xs text-slate-300">Total</p>
            <p id="lumpTotal" class="text-white font-bold">₹0</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center text-slate-500 text-sm py-8 border-t border-slate-800">
    <p>📡 Live data from Yahoo Finance (same as Groww)</p>
    <p class="mt-2">⚠️ Investments are subject to market risks</p>
  </footer>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const symbol = params.get('symbol') || 'NIFTYBEES.NS';
const id = parseInt(params.get('id'));

const etfList = JSON.parse(localStorage.getItem('etfList') || '[]');
let selected = etfList.find(e => e.id === id) || { 
  name: symbol, symbol, display: symbol.replace('.NS',''), return5Y: 15, expenseRatio: 0.1, risk: 'Moderate', category: 'ETF', aum: 'N/A'
};

let chart = null;
let currentPrice = 0;

const fmt = (n) => "₹" + Math.round(n).toLocaleString('en-IN');

async function loadChart(range='1y', interval='1d') {
  document.getElementById('chartLoader').style.display = 'block';
  
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.range === range) btn.classList.add('active');
  });

  try {
    // Call our own API endpoint - no CORS issues!
    const apiUrl = `/api/quote?symbol=${encodeURIComponent(symbol)}&range=${range}&interval=${interval}`;
    const res = await fetch(apiUrl);
    
    if (!res.ok) throw new Error('API failed');
    
    const data = await res.json();
    
    if (!data.chart || !data.chart.result || !data.chart.result[0]) {
      throw new Error('Invalid data');
    }
    
    const result = data.chart.result[0];
    const timestamps = result.timestamp || [];
    const rawPrices = result.indicators.quote[0].close || [];
    
    // Fill null values with previous price
    const prices = [];
    let lastValid = rawPrices.find(p => p !== null) || 0;
    rawPrices.forEach(p => {
      if (p !== null) lastValid = p;
      prices.push(lastValid);
    });
    
    const meta = result.meta;
    currentPrice = meta.regularMarketPrice;
    
    const labels = timestamps.map(t => {
      const d = new Date(t * 1000);
      if (range === '1d' || range === '5d') {
        return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit'});
      }
      return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'2-digit'});
    });
    
    document.getElementById('dataSource').innerText = '🟢 Live: Yahoo Finance';
    
    updateHeader(meta);
    updateLivePrice(meta);
    drawChart(labels, prices);
    
  } catch(err) {
    console.error('Chart load failed:', err);
    document.getElementById('header').innerHTML = `
      <h2 class="text-2xl font-bold mb-2">${selected.name}</h2>
      <p class="text-yellow-400">⚠️ Could not fetch live data. ${err.message}</p>
      <p class="text-slate-400 mt-2 text-sm">Make sure /api/quote.js is deployed on Vercel</p>
    `;
    document.getElementById('dataSource').innerText = '🔴 API Error';
  }
  
  document.getElementById('chartLoader').style.display = 'none';
  calcSIP();
  calcLump();
}

function drawChart(labels, prices) {
  if (chart) chart.destroy();
  
  const ctx = document.getElementById('priceChart').getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  
  // Green if up, red if down
  const isUp = prices[prices.length-1] >= prices[0];
  const color = isUp ? '#10b981' : '#ef4444';
  
  gradient.addColorStop(0, isUp ? 'rgba(16, 185, 129, 0.4)' : 'rgba(239, 68, 68, 0.4)');
  gradient.addColorStop(1, isUp ? 'rgba(16, 185, 129, 0)' : 'rgba(239, 68, 68, 0)');
  
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: selected.display + ' Price',
        data: prices,
        borderColor: color,
        backgroundColor: gradient,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 5,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#94a3b8' } },
        tooltip: { 
          backgroundColor: '#1e293b',
          titleColor: '#f1f5f9',
          bodyColor: '#f1f5f9',
          borderColor: '#334155',
          borderWidth: 1,
          callbacks: {
            label: (ctx) => '₹' + ctx.parsed.y.toFixed(2)
          }
        }
      },
      scales: {
        x: { 
          ticks: { color: '#94a3b8', maxTicksLimit: 8 },
          grid: { color: '#1e293b' }
        },
        y: { 
          ticks: { color: '#94a3b8', callback: (v) => '₹' + v.toFixed(0) },
          grid: { color: '#1e293b' }
        }
      }
    }
  });
}

function updateHeader(meta) {
  const change = meta.regularMarketPrice - meta.chartPreviousClose;
  const changePct = (change / meta.chartPreviousClose) * 100;
  
  document.getElementById('header').innerHTML = `
    <div class="flex flex-wrap justify-between items-start gap-4">
      <div>
        <h2 class="text-3xl font-bold mb-2">${selected.name}</h2>
        <p class="text-slate-400">${selected.display} • ${selected.category} • ${meta.exchangeName || 'NSE'}</p>
        <div class="flex flex-wrap gap-4 mt-3 text-sm">
          <span class="text-slate-400">Risk: <span class="text-yellow-400">${selected.risk}</span></span>
          <span class="text-slate-400">Expense: <span class="text-white">${selected.expenseRatio}%</span></span>
          <span class="text-slate-400">5Y Return: <span class="text-green-400">${selected.return5Y}%</span></span>
        </div>
      </div>
      <div class="text-right">
        <p class="text-4xl font-bold text-white">₹${meta.regularMarketPrice.toFixed(2)}</p>
        <p class="${change >= 0 ? 'text-green-400' : 'text-red-400'} text-sm font-semibold">
          ${change >= 0 ? '▲' : '▼'} ${Math.abs(change).toFixed(2)} (${changePct.toFixed(2)}%) Today
        </p>
        <p class="text-xs text-slate-500 mt-1">Last updated: ${new Date().toLocaleTimeString('en-IN')}</p>
      </div>
    </div>
  `;
}

function updateLivePrice(meta) {
  const items = [
    { label: 'Day High', value: '₹' + (meta.regularMarketDayHigh || 0).toFixed(2), color: 'text-green-400' },
    { label: 'Day Low', value: '₹' + (meta.regularMarketDayLow || 0).toFixed(2), color: 'text-red-400' },
    { label: '52W High', value: '₹' + (meta.fiftyTwoWeekHigh || 0).toFixed(2), color: 'text-blue-400' },
    { label: '52W Low', value: '₹' + (meta.fiftyTwoWeekLow || 0).toFixed(2), color: 'text-purple-400' }
  ];
  document.getElementById('livePrice').innerHTML = items.map(i => `
    <div class="bg-slate-800/60 rounded-2xl p-4 border border-slate-700">
      <p class="text-xs text-slate-400 mb-1">${i.label}</p>
      <p class="${i.color} font-bold text-lg">${i.value}</p>
    </div>
  `).join('');
}

function calcSIP() {
  const amt = +document.getElementById("sipAmount").value;
  const yrs = +document.getElementById("sipYears").value;
  document.getElementById("sipAmtLabel").innerText = "₹" + amt.toLocaleString('en-IN');
  document.getElementById("sipYearsLabel").innerText = yrs + " years";
  const rate = (selected.return5Y || 15) / 100 / 12;
  const months = yrs * 12;
  const fv = amt * ((Math.pow(1+rate, months) - 1) / rate) * (1+rate);
  const inv = amt * months;
  document.getElementById("sipInvested").innerText = fmt(inv);
  document.getElementById("sipGains").innerText = fmt(fv-inv);
  document.getElementById("sipTotal").innerText = fmt(fv);
}

function calcLump() {
  const amt = +document.getElementById("lumpAmount").value;
  const yrs = +document.getElementById("lumpYears").value;
  document.getElementById("lumpAmtLabel").innerText = "₹" + amt.toLocaleString('en-IN');
  document.getElementById("lumpYearsLabel").innerText = yrs + " years";
  const rate = (selected.return5Y || 15) / 100;
  const fv = amt * Math.pow(1+rate, yrs);
  document.getElementById("lumpInvested").innerText = fmt(amt);
  document.getElementById("lumpGains").innerText = fmt(fv-amt);
  document.getElementById("lumpTotal").innerText = fmt(fv);
}

document.getElementById("sipAmount").addEventListener("input", calcSIP);
document.getElementById("sipYears").addEventListener("input", calcSIP);
document.getElementById("lumpAmount").addEventListener("input", calcLump);
document.getElementById("lumpYears").addEventListener("input", calcLump);

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    loadChart(btn.dataset.range, btn.dataset.interval);
  });
});

loadChart('1y','1d');
calcSIP();
calcLump();
</script>
</body>
</html>
